#    shield: Sofle_L Nice_view_config nice_view_custom
#    snippet: studio-rpc-usb-uart
#    artifact-name: Sofle_left_nice_view
#  - board: nice_nano_v2
#    shield: Sofle_R Nice_view_config nice_view_custom
#    artifact-name: Sofle_right_nice_view